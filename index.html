<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tetris Game</title>
    <style>
      :root {
        font-family: "Segoe UI", sans-serif;
        color: #f4f1ea;
        background: #121212;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(180deg, #1f2937 0%, #111827 100%);
      }

      .page-header {
        display: flex;
        justify-content: center;
        padding: 24px 16px 8px;
      }

      .scoreboard {
        min-width: 220px;
        padding: 14px 20px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.08);
        text-align: center;
        backdrop-filter: blur(8px);
      }

      .scoreboard-label {
        margin: 0;
        font-size: 14px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        opacity: 0.8;
      }

      .scoreboard-value {
        margin: 8px 0 0;
        font-size: 40px;
        font-weight: 700;
        line-height: 1;
      }

      .controls {
        display: flex;
        justify-content: center;
        padding: 8px 16px 24px;
      }

      .controls button {
        padding: 10px 16px;
        border: 0;
        border-radius: 999px;
        background: #f59e0b;
        color: #111827;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <header class="page-header">
      <section class="scoreboard" aria-label="当前得分">
        <p class="scoreboard-label">当前得分</p>
        <p class="scoreboard-value" id="score">0</p>
      </section>
    </header>

    <main class="controls">
      <button type="button" id="line-clear-button">模拟消行 +100</button>
    </main>

    <script>
      let score = 0;
      const scoreElement = document.getElementById("score");
      const lineClearButton = document.getElementById("line-clear-button");

      function renderScore() {
        scoreElement.textContent = String(score);
      }

      function addScore(points) {
        score += points;
        renderScore();
      }

      window.addEventListener("tetris:score", (event) => {
        const points = Number(event.detail?.points ?? 0);

        if (!Number.isFinite(points) || points <= 0) {
          return;
        }

        addScore(points);
      });

      lineClearButton.addEventListener("click", () => {
        window.dispatchEvent(
          new CustomEvent("tetris:score", {
            detail: { points: 100, reason: "line-clear" },
          }),
        );
      });

      window.tetrisGame = {
        addScore,
        lineCleared(lines = 1) {
          window.dispatchEvent(
            new CustomEvent("tetris:score", {
              detail: { points: lines * 100, reason: "line-clear" },
            }),
          );
        },
      };

      renderScore();
    </script>
  </body>
</html>
